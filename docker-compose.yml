name: hindsight

services:
  # TimescaleDB database service
  database:
    image: timescale/timescaledb:2.13.0-pg16
    container_name: hindsight-database
    environment:
      POSTGRES_DB: drive_analysis
      POSTGRES_USER: hindsight
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hindsight_dev_password}
      TIMESCALEDB_TELEMETRY: off
    ports:
      - "5432:5432"
    volumes:
      - database_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
      - ./database/schema.sql:/docker-entrypoint-initdb.d/02-schema.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hindsight -d drive_analysis"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI backend service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hindsight-backend
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: drive_analysis
      DB_USER: hindsight
      DB_PASSWORD: ${DB_PASSWORD:-hindsight_dev_password}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8000
      DEBUG: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./shared:/app/shared
      - ./backend/data:/app/data:ro
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # React frontend service (development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: hindsight-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

  # Data ingestion service (run on-demand)
  ingestion:
    build:
      context: ./ingestion
      dockerfile: Dockerfile
    container_name: hindsight-ingestion
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: drive_analysis
      DB_USER: hindsight
      DB_PASSWORD: ${DB_PASSWORD:-hindsight_dev_password}
      DATA_INTERP_PATH: data/pds/best_interp.csv
      DATA_OBSERVATIONS_PATH: data/pds/best_tactical.csv
      DATA_EVR_PATH: data/unlimited_release_m20_data/EVRs
      DATA_MOBILITY_PATH: data/unlimited_release_m20_data/telemetry_sys_mob_1040_1055/SOLS_1040_1055_SYS_MOB.csv
      DATA_MOTOR_PATH: data/unlimited_release_m20_data/telemetry_drive_steer_1040_1055
    volumes:
      - ../data:/app/data:ro
      - backend_data:/app/writable
      - ./ingestion:/app/src
      - ./shared:/app/shared
    depends_on:
      database:
        condition: service_healthy
    profiles:
      - ingestion  # Only start when explicitly requested

  # Nginx reverse proxy (for production)
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: hindsight-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    profiles:
      - production  # Only for production deployment

volumes:
  database_data:
    driver: local
  backend_data:
    driver: local

networks:
  default:
    name: hindsight-network
    driver: bridge
