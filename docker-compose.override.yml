# Development overrides for docker-compose.yml
# This file is automatically loaded by docker-compose and provides development-specific configurations

services:
  backend:
    volumes:
      # Mount source code for development hot-reload
      - ./backend:/app:delegated
    environment:
      # Enable development features
      DEBUG: "true"
      # Use reload for development
      UVICORN_RELOAD: "true"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    volumes:
      # Mount source code for hot-reload, exclude node_modules
      - ./frontend:/app:delegated
      - /app/node_modules
    environment:
      # Development-specific environment
      NODE_ENV: development
      VITE_API_BASE_URL: http://localhost:8000
    stdin_open: true
    tty: true

  database:
    ports:
      # Expose database port for direct access during development
      - "5432:5432"
    environment:
      # Development database settings
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hindsight_dev_password}
